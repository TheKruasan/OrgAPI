services:
  postgres:
    image: postgres:16
    container_name: org_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: org_db

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: org_api

    ports:
      - "8080:8080"

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: org_db
      APP_PORT: 8080

    depends_on:
      - postgres

volumes:
  pgdata: