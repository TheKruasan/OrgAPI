services:
  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: org_db

    ports:
      - "5432:5432"

  app:
    build: .

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: org_db
      APP_PORT: 8080

    ports:
      - "8080:8080"

    depends_on:
      - postgres