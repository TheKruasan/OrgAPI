version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: org-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: org_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    container_name: org-migrate
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/app/migration.sh"]
    command: ["up"]

  app:
    build: .
    container_name: org-app
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: org_db

volumes:
  pgdata: